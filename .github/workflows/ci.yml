name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,docs,dev]"

      - name: Lint with ruff
        run: |
          ruff check PocketGraphRAG/ --select E,F --ignore E501,E402,E741,F401,F811
        continue-on-error: true  # 风格问题不阻塞 CI

      - name: Run tests
        run: |
          python -m pytest PocketGraphRAG/tests/ -x -q --tb=short
        env:
          POCKET_TEST_MODE: "1"
          TRANSFORMERS_OFFLINE: "1"
          HF_HUB_OFFLINE: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            test-output.xml
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: pocketgraphrag:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8000:8000 pocketgraphrag:ci
          sleep 30
          curl -s http://localhost:8000/api/health | grep -q "ok" && echo "Health check passed" || exit 1
          docker stop test-container
          docker rm test-container
