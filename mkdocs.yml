site_name: PocketGraphRAG Docs
site_description: Local-first GraphRAG with Multi-Model KG Fusion, Zero-LLM Query, and 2.7x LightRAG MRR on HotpotQA.
site_url: https://jyzisliubi.github.io/Pocket-graph/
repo_url: https://github.com/jyzisliubi/Pocket-graph
repo_name: jyzisliubi/Pocket-graph
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Data Import: data-import.md
  - Concepts:
      - Architecture: architecture.md
      - Search Modes: search-modes.md
      - GraphRAG Gap Analysis: graphrag_gap_analysis.md
  - Usage:
      - Python API: python-api.md
      - REST API: rest-api.md
      - CLI: cli.md
  - Deployment: deployment.md
  - Evaluation: evaluation.md
  - FAQ: faq.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jyzisliubi/Pocket-graph
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pocketgraphrag/
  generator: false

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
