# PocketGraphRAG Docker Compose
# 一键启动：docker-compose up -d
# 对标 LightRAG docker-compose-full.yml，支持 Ollama 外部连接

version: "3.8"

services:
  pocketgraphrag:
    build: .
    image: pocketgraphrag:latest
    container_name: pocketgraphrag
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化：索引、文档、模型缓存
      - ./index:/app/index
      - ./user_docs:/app/user_docs
      - ./data:/app/data
      - ./models:/app/models
      # .env 配置（可选）
      - ./.env:/app/.env:ro
    environment:
      - POCKET_DATA_PATH=/app/data/triples.txt
      - POCKET_INDEX_DIR=/app/index
      - POCKET_USER_DOCS_DIR=/app/user_docs
      - POCKET_SEARCH_MODE=mix
      # Ollama 连接（host.docker.internal 访问宿主机服务）
      - OLLAMA_API_BASE=http://host.docker.internal:11434/v1
      - OLLAMA_MODEL=qwen2.5:7b
      # Embedding 模型本地缓存路径
      - POCKET_EMBEDDING_MODEL=BAAI/bge-small-zh-v1.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # 可选：Redis 用于 LLM Cache（对标 LightRAG v1.4.3）
  redis:
    image: redis:7-alpine
    container_name: pocketgraphrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - cache  # docker-compose --profile cache up 启用

  # 可选：Neo4j 图存储后端
  neo4j:
    image: neo4j:5-community
    container_name: pocketgraphrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/pocketgraphrag
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    profiles:
      - graph  # docker-compose --profile graph up 启用

volumes:
  redis-data:
  neo4j-data:
