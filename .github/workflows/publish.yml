name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

# Trusted Publishing (OIDC) — no long-lived API tokens required.
# Prerequisite: register this workflow as a Trusted Publisher on PyPI:
#   https://docs.pypi.org/trusted-publishers/
# PyPI config:
#   - PyPI Project name: pocketgraphrag
#   - Owner:    JayZ
#   - Repo:     PocketGraphRAG
#   - Workflow: publish.yml
#   - Env name: pypi (must match the `environment:` field below)
permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi # required for Trusted Publishing
    permissions:
      id-token: write # required for OIDC token exchange
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      # No `password:` → pypa/gh-action-pypi-publish uses Trusted Publishing (OIDC).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
