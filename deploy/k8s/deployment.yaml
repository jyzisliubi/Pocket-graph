# PocketGraphRAG Kubernetes Deployment
# 对标 LightRAG k8s-deploy/，支持生产级 K8s 部署
#
# 使用：kubectl apply -f deploy/k8s/

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocketgraphrag
  labels:
    app: pocketgraphrag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pocketgraphrag
  template:
    metadata:
      labels:
        app: pocketgraphrag
    spec:
      containers:
        - name: pocketgraphrag
          image: pocketgraphrag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POCKET_SEARCH_MODE
              value: "mix"
            - name: OLLAMA_API_BASE
              value: "http://ollama-service:11434/v1"
            - name: OLLAMA_MODEL
              value: "qwen2.5:7b"
            - name: POCKET_EMBEDDING_MODEL
              value: "BAAI/bge-small-zh-v1.5"
            # WORKSPACE 数据隔离（v0.3.7）
            - name: POCKET_WORKSPACE
              value: "default"
            # LLM Cache（v0.3.7）
            - name: POCKET_LLM_CACHE
              value: "1"
            - name: POCKET_LLM_CACHE_BACKEND
              value: "redis"
            - name: POCKET_LLM_CACHE_REDIS_URL
              value: "redis://redis-service:6379/0"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: index-data
              mountPath: /app/index
            - name: docs-data
              mountPath: /app/user_docs
            - name: model-cache
              mountPath: /app/models
      volumes:
        - name: index-data
          persistentVolumeClaim:
            claimName: pocketgraphrag-index
        - name: docs-data
          persistentVolumeClaim:
            claimName: pocketgraphrag-docs
        - name: model-cache
          persistentVolumeClaim:
            claimName: pocketgraphrag-models

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocketgraphrag-index
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocketgraphrag-docs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocketgraphrag-models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
